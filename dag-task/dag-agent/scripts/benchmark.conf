# DAG Agent Benchmark Test Configuration
# This file defines benchmark test scenarios and parameters

# Benchmark execution mode: quick|full|custom
BENCHMARK_MODE="quick"

# Agent configuration
AGENT_BASE_URL="http://localhost:20000"
AGENT_TIMEOUT_SECONDS=10

# Quick benchmark settings (default, fast feedback)
QUICK_BENCHMARK_TASKS=50
QUICK_BENCHMARK_THREADS=4
QUICK_BENCHMARK_BATCH_SIZE=5

# Full benchmark settings (comprehensive testing)
FULL_BENCHMARK_TASKS=500
FULL_BENCHMARK_THREADS=8
FULL_BENCHMARK_BATCH_SIZE=20
FULL_BENCHMARK_DURATION_SECONDS=300

# Custom benchmark settings (user-defined)
CUSTOM_BENCHMARK_TASKS=100
CUSTOM_BENCHMARK_THREADS=4
CUSTOM_BENCHMARK_BATCH_SIZE=10

# Task configuration
# Task types: echo, shell, io, cpu
BENCHMARK_TASK_TYPE="echo"

# Task behavior parameters
TASK_TIMEOUT_MS=5000
TASK_PRIORITY="NORMAL"  # NORMAL, HIGH, LOW

# Performance thresholds (for evaluation/warnings)
THROUGHPUT_TARGET=1000           # tasks per second
THROUGHPUT_WARNING=800           # tasks per second
LATENCY_P99_TARGET=50            # milliseconds
LATENCY_P99_WARNING=100          # milliseconds
SUCCESS_RATE_TARGET=99.5         # percentage

# Output configuration
SAVE_METRICS=true
GENERATE_HTML_REPORT=true
OUTPUT_DIRECTORY="benchmark_results"
LOG_LEVEL="INFO"  # DEBUG, INFO, WARN, ERROR

# Advanced options
ENABLE_CONCURRENT_SUBMISSION=true
ENABLE_BACKPRESSURE_TEST=false
ENABLE_PRIORITY_TEST=false
ENABLE_HEALTH_CHECKS=true
ENABLE_MEMORY_PROFILING=false

# Request configuration
REQUEST_TIMEOUT_SECONDS=10
REQUEST_RETRY_COUNT=0
REQUEST_RETRY_DELAY_MS=100

