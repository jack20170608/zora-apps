dag-agent {
  # Full URL that this agent is accessible at from the DAG server
  agentUrl = "http://localhost:8080"

  # URL of the DAG scheduling server to register with
  dagServerUrl = "http://localhost:8081"

  # Unique identifier for this agent instance
  agentId = "agent-local"

  # Whether to auto-register with the DAG server on startup
  autoRegister = true

  # Maximum number of concurrent tasks that can execute
  maxConcurrentTasks = 4

  # Maximum number of pending tasks waiting in the queue
  maxPendingTasks = 100

  # List of execution keys (task types) that this agent supports
  supportedExecutionKeys = [
    "top.ilovemyhome.dagtask.core.DefaultTaskExecution"
  ]
}
