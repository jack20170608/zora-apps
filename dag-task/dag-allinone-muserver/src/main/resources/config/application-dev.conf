# DAG Task AllInOne Server - Development Configuration
# Overrides base application.conf for local development

# Database: local PostgreSQL (adjust to your environment)
database {
    url = "jdbc:postgresql://localhost:5432/dagtask"
    jdbcUrl = ${database.url}
    username = "postgres"
    password = "postgres"
    maximumPoolSize = 5
    pool {
        maxSize = ${database.maximumPoolSize}
    }
}

# Embedded agent: moderate limits for dev
agent {
    maxConcurrentTasks = 4
    maxPendingTasks = 100
    taskLogDir = "/tmp/dagtask/logs"
}

# Dev user with password hash of "1" (SHA-256)
security {
    users = [
        {
            id = "1"
            name = "admin"
            displayName = "Administrator"
            roles = ["admin", "read", "write"]
            passwordHashVal = "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
            attributes = {
                email = "admin@localhost"
            }
        }
    ]
    jwt {
        publicKeyLocation = "classpath:key/public.key"
        privateKeyLocation = "classpath:key/private.key"
        ttl = "7d"
    }
}
