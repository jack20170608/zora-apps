# DAG Task AllInOne Server - Production Configuration
# Overrides base application.conf for production deployment

# Database: production PostgreSQL (must be set via external config or secrets)
database {
    url = "NOT-SET"
    jdbcUrl = ${database.url}
    username = "NOT-SET"
    password = "NOT-SET"
    maximumPoolSize = 20
    minimumIdle = 5
    pool {
        maxSize = ${database.maximumPoolSize}
    }
}

# Embedded agent: higher limits for production
agent {
    maxConcurrentTasks = 8
    maxPendingTasks = 500
    taskLogDir = "/var/log/dagtask"
}

# Production JWT: use file-based keys (rotate regularly)
security {
    jwt {
        publicKeyLocation = "file:/etc/dagtask/key/public.key"
        privateKeyLocation = "file:/etc/dagtask/key/private.key"
        ttl = "1d"
    }
}
