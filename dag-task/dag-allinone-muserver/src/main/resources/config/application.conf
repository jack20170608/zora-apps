# DAG Task AllInOne Server - Base Configuration
# Environment-specific values are overridden by application-{env}.conf

name = "dag-task-allinone-server"

# Unified HTTP server settings
server {
    port = 8080
    host = "0.0.0.0"
    contextPath = "dag-task"
}

# Shared database configuration
# Both 'database.url' (AllInOne DatabaseBootstrap) and 'database.jdbcUrl' (admin AppContext) are required
database {
    url = "NOT-SET"
    jdbcUrl = ${database.url}
    username = "NOT-SET"
    password = "NOT-SET"
    driverClassName = "org.postgresql.Driver"
    maximumPoolSize = 10
    minimumIdle = 2
    autoCommit = true
    readOnly = false
    pool {
        maxSize = ${database.maximumPoolSize}
    }
}

# Embedded agent settings
agent {
    maxConcurrentTasks = 4
    maxPendingTasks = 100
    taskLogDir = "/tmp/dagtask/logs"
}

# Security settings
security {
    cookie {
        name = "dag_token"
        valueType = "JWT"
    }
    whiteList = [
        "/**/openapi.json",
        "/**/api.html",
        "/dag-task/api/v1/agent/health",
        "/dag-task/api/v1/agent/ping",
        "/dag-task/login"
    ]
    users = [
        {
            id = "1"
            name = "admin"
            displayName = "Administrator"
            roles = ["admin", "read", "write"]
            passwordHashVal = "NOT-SET"
            attributes = {
                email = "admin@localhost"
            }
        }
    ]
    jwt {
        issuer = "dag-task-allinone"
        audience = "dag-task-client"
        publicKeyLocation = "NOT-SET"
        privateKeyLocation = "NOT-SET"
        ttl = "7d"
    }
}

# Flyway migration settings
# 'flyway.location' is used by DatabaseBootstrap; 'flyway.locations' is used by admin AppContext
flyway {
    location = "db/migration/postgresql"
    locations = ["db/migration/postgresql"]
    baselineOnMigrate = true
    baselineVersion = "0"
    baselineDescription = "Baseline"
    table = "flyway_schema_history"
    defaultSchema = "public"
}

# Scheduler settings (reserved for future tuning)
scheduler {
    scanInterval = 30
}
