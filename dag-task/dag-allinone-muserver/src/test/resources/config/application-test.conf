# DAG Task AllInOne Server - Test Configuration
# Uses H2 in-memory database for isolated testing without PostgreSQL

name = "dag-task-allinone-server-test"

# H2 in-memory database
database {
    url = "jdbc:h2:mem:dagtask_test;DB_CLOSE_DELAY=-1"
    jdbcUrl = ${database.url}
    username = "sa"
    password = ""
    driverClassName = "org.h2.Driver"
    maximumPoolSize = 5
    minimumIdle = 1
    autoCommit = true
    readOnly = false
    pool {
        maxSize = ${database.maximumPoolSize}
    }
}

# Test agent settings
agent {
    maxConcurrentTasks = 2
    maxPendingTasks = 10
    taskLogDir = "target/test-logs"
}

# Test security with classpath keys
security {
    cookie {
        name = "dag_token"
        valueType = "JWT"
    }
    whiteList = [
        "/**/openapi.json",
        "/**/api.html",
        "/dag-task/api/v1/agent/health",
        "/dag-task/api/v1/agent/ping",
        "/dag-task/login"
    ]
    users = [
        {
            id = "1"
            name = "admin"
            displayName = "Test Admin"
            roles = ["admin", "read", "write"]
            passwordHashVal = "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
            attributes = {
                email = "admin@test.local"
            }
        }
    ]
    jwt {
        issuer = "dag-task-allinone-test"
        audience = "dag-task-client"
        publicKeyLocation = "classpath:key/public.key"
        privateKeyLocation = "classpath:key/private.key"
        ttl = "1h"
    }
}

# Flyway: use H2-compatible migration location if available, otherwise PostgreSQL
flyway {
    location = "db/migration/postgresql"
    locations = ["db/migration/postgresql"]
    baselineOnMigrate = true
    baselineVersion = "0"
    baselineDescription = "Baseline"
    table = "flyway_schema_history"
    defaultSchema = "public"
}
