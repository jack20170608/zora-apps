# Embedded PostgreSQL for testing
name = "dag-scheduler-server"

database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/postgres"
    username = "postgres"
    password = "postgres"
    driverClassName = "org.postgresql.Driver"
    maximumPoolSize = 5
    minimumIdle = 1
    autoCommit = false
    readOnly = false
}


security = {
    whiteList = [
        "/**/openapi.json",
        "/**/api.html",
        "/**/registration/start",
    ]
}

jwt = {
    issuer = "dag-task-scheduler"
    publicKeyLocation = "classpath:key/public.key"
    privateKeyLocation = "classpath:key/private.key"
    ttl = "7d"
}
