# Embedded PostgreSQL for testing
name = "dag-task-server"

database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/postgres"
    username = "postgres"
    password = "postgres"
    driverClassName = "org.postgresql.Driver"
    maximumPoolSize = 5
    minimumIdle = 1
    autoCommit = false
    readOnly = false
}

flyway = {
    locations = ["classpath:db/migration/postgresql"]
    baselineVersion = "1"
    baselineDescription = "Baseline"
    baselineOnMigrate = true
    table = "flyway_schema_history"
    defaultSchema = "public"
}

cookie = {
    name = "dag-task-server-jwt"
    valueType = "JWT"
}

security = {
    whiteList = [
        "/**/openapi.json",
        "/**/api.html",
        "/**/registration/start",
    ]
}

jwt = {
    issuer = "dag-task-scheduler"
    publicKeyLocation = "classpath:key/public.key"
    privateKeyLocation = "classpath:key/private.key"
    ttl = "7d"
}

users = [
    {
        id = "1", name = "admin"
        , displayName = "administrator"
        , roles = ["admin", "read", "write"]
        , passwordHashVal = "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
        , attributes = {
        email = "admin@localhost"
        phone = "1234567890"
    }
    }
]
