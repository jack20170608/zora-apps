# MuServer configuration for DAG Task Agent
muserver {
  # HTTP server port
  port = 8080

  # HTTP server host address to bind to
  host = "0.0.0.0"

  # Context path for the server
  contextPath = "/"

  # Maximum header size
  maxHeaderSize = 8192

  # Idle timeout in milliseconds
  idleTimeout = 30000
}

# Include the base agent configuration
include "classpath:config/agent.conf"
