## The DAG agent configuration
dag-agent {
    agentUrl = "http://localhost:20000/agent"
    agentName = "local-agent-01"
    dagServerUrl = "http://localhost:8000/dag-scheduler-server/"
    agentId = "local-agent-001"
    autoRegister = false
    generateToken = true
    maxConcurrentTasks = 4
    maxPendingTasks = 100
    supportedExecutionKeys = [
        "top.ilovemyhome.dagtask.agent.execution.EchoExecution"
        "top.ilovemyhome.dagtask.agent.execution.LongRunningExecution"
    ]
}
